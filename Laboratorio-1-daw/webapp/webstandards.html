    <h2>Estándar W3C: WCAG 2.1</h2>
    <p>Las Pautas de Accesibilidad para el Contenido Web (WCAG) aseguran que la web sea usable para personas con discapacidades.</p>
    <ul>
        <li><strong>Perceptible:</strong> Información presentable a los sentidos.</li>
        <li><strong>Operable:</strong> Componentes navegables.</li>
        <li><strong>Comprensible:</strong> Texto legible y claro.</li>
    </ul>
